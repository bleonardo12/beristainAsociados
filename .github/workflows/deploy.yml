name: Deploy al VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Ajuste: Especificamos el puerto 2222 para el keyscan
          ssh-keyscan -p 2222 -H srv777726.hstgr.cloud >> ~/.ssh/known_hosts

      - name: Deploy al VPS
        run: |
          # Ajuste: Añadimos -p 2222 para conectarse por tu puerto personalizado
          ssh -i ~/.ssh/id_ed25519 -p 2222 root@srv777726.hstgr.cloud << 'ENDSSH'
            set -e
            echo "📦 Iniciando deploy..."
            cd /var/www/beristainAsociados

            echo "🔄 Fetching cambios de master..."
            git fetch origin master

            echo "✨ Aplicando cambios..."
            git reset --hard origin/master

            echo "✅ Último commit desplegado:"
            git log -1 --oneline

            echo "🎉 Deploy completado exitosamente!"
          ENDSSH

      - name: Notificar resultado
        if: success()
        run: echo "✅ Deploy exitoso a srv777726.hstgr.cloud"