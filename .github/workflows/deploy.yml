name: Deploy al VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      # REEMPLAZAMOS EL PASO ANTERIOR POR ESTE AGENTE OFICIAL
      - name: Configurar SSH Agent y Clave
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Registrar Host de Confianza
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 -H srv777726.hstgr.cloud >> ~/.ssh/known_hosts

      - name: Deploy al VPS
        run: |
          # Ahora ya no necesitas pasarle el "-i", el agente la inyecta solo
          ssh -p 2222 root@srv777726.hstgr.cloud << 'ENDSSH'
            set -e
            echo "📦 Iniciando deploy..."
            cd /var/www/beristainAsociados

            echo "🔄 Fetching cambios de master..."
            git fetch origin master

            echo "✨ Aplicando cambios..."
            git reset --hard origin/master

            echo "✅ Último commit desplegado:"
            git log -1 --oneline

            echo "🎉 Deploy completado exitosamente!"
          ENDSSH

      - name: Notificar resultado
        if: success()
        run: echo "✅ Deploy exitoso a srv777726.hstgr.cloud"